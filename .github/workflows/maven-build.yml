name: Maven Build

on:
  push:
    branches:
      - master
      - 4.0.*-SNAPSHOT
  pull_request:
    branches:
      - master
      - 4.0.*-SNAPSHOT

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [8, 11, 21]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build SwingSet core on Java 8
        if: matrix.java-version == '8'
        run: mvn -B -ntp clean verify -pl swingset -am
    
      - name: Build full project on Java 11+
        if: matrix.java-version != '8'
        run: mvn -B -ntp clean verify
