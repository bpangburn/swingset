name: CodeQL

on:
  push:
    branches:
      - master
      - "4.0.*-SNAPSHOT"
  pull_request:
    branches:
      - master
      - "4.0.*-SNAPSHOT"
  schedule:
    - cron: "33 7 * * 1"

permissions:
  security-events: write
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended,security-and-quality

      - name: Build SwingSet core on Java 8
        if: matrix.java == '8'
        run: mvn -B -ntp clean verify -pl swingset -am
    
      - name: Build full project on Java 11+
        if: matrix.java != '8'
        run: mvn -B -ntp clean verify

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
